# This is a basic workflow that is manually triggered

name: Release workflow

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API .
on:
  push:
    tags:
    - '*'
    # tags: v[1-9]+.[0-9]+.[0-9]+
    # tags: '**'
    # branches: main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build
        id: build
        run: |
          echo ${{ github.sha }} > Release.txt
          echo "Creating ${{ github.ref_name }} Release"
          echo "Tag name from GITHUB_REF_NAME: $GITHUB_REF_NAME"
          echo "Tag name from github.ref_name: ${{ github.ref_name }}"
          new_tag="${{ github.ref_name }}"
          new_tag="${new_tag:1}"
          echo "New Tag: ${new_tag}"
          awk -v ver="${new_tag}" '/^#+ \[/ { if (p) { exit }; if ($2 == "["ver"]") { p=1; next} } p && NF' "CHANGELOG.md" > rel_changelog.txt
      - name: Test
        run: |
          cat Release.txt
          echo Build Output: ${{ steps.build.outputs.BODY_TEXT }}
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Release.txt
          body_path: rel_changelog.txt
          # body: "Body of this release: ${{ steps.build.outputs.BODY_TEXT }}"
          name: "Release ${{ github.ref_name }}"
